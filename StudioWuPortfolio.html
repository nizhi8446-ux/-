<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吴泽枭摄影作品集 - Studio.Wu</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @layer base {
            body { @apply antialiased text-zinc-900 bg-white; }
            selection { @apply bg-zinc-950 text-white; }
        }
        .masonry-grid { column-count: 1; column-gap: 2.5rem; }
        @media (min-width: 768px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 3; } }
        .break-inside { break-inside: avoid; }
        
        /* Custom scrollbar for refined look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e5e5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4d4d4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React and Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Assets
        const PHOTOS = [
            { id: 1, category: '建筑', title: '现代构筑', url: './摄影作品/1f0da5756eca3dea18b011a213847a55.jpg' },
            { id: 2, category: '自然', title: '森之语', url: './摄影作品/214186f764a000a2435bb4f4f3a29fda.jpg' },
            { id: 3, category: '人文', title: '城中叙事', url: './摄影作品/30c5e6fbe23164c21d9109b873137e39.jpg' },
            { id: 4, category: '建筑', title: '几何律动', url: './摄影作品/3c61392fdb8f6b068c88dae7e78cde6e.jpg' },
            { id: 5, category: '自然', title: '微光瞬间', url: './摄影作品/42775ddc5f5251076533d41da655ea0f.jpg' },
            { id: 6, category: '人文', title: '街角日常', url: './摄影作品/6423603aaf1e09367285856a3c618878.jpg' },
            { id: 7, category: '建筑', title: '极简主义', url: './摄影作品/66a8b3989b8c32204ca6890cfc116aff.jpg' },
            { id: 8, category: '自然', title: '远山', url: './摄影作品/78d83b60bc03ed0662e3e0ed005740e0.jpg' },
            { id: 9, category: '人文', title: '时光印记', url: './摄影作品/7b3cb80395803c663fba84b195bff78c.jpg' },
            { id: 10, category: '建筑', title: '都市脊梁', url: './摄影作品/89c15a96b4c74db3a0976bfc448604bc.jpg' },
            { id: 11, category: '自然', title: '碧水青空', url: './摄影作品/8eb2fce9ce9a5fcb1d934bce3623622b.jpg' },
            { id: 12, category: '人文', title: '群生相', url: '/摄影作品/99b3353702ec034b444bd861ccffaef8.jpg' },
            { id: 13, category: '建筑', title: '光影交织', url: '/摄影作品/9e8b84dd2cb0d2806795c51e00a4e6ad.jpg' },
            { id: 14, category: '自然', title: '原野呼唤', url: '/摄影作品/b6bf0470af2e19f442285c3c402aa6f9.jpg' },
            { id: 15, category: '人文', title: '烟火气', url: '/摄影作品/b8415dd631bf9633e7f78007cba06f63.jpg' },
            { id: 16, category: '建筑', title: '悬浮空间', url: '/摄影作品/ce00528765fcf5dc2a51f81bda077eab.jpg' },
            { id: 17, category: '自然', title: '破晓', url: '/摄影作品/ce062d646a59988ac91e297e6a5ccd16.jpg' },
            { id: 18, category: '人文', title: '独行者', url: '/摄影作品/e8cd2e96288a3fb05b0a3635d553b1b7.jpg' },
        ];

        const CATEGORIES = ['全部', '建筑', '自然', '人文'];

        function App() {
            const [activeCategory, setActiveCategory] = useState('全部');
            const [selectedImage, setSelectedImage] = useState(null);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            const filteredPhotos = activeCategory === '全部' 
                ? PHOTOS 
                : PHOTOS.filter(p => p.category === activeCategory);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [isMenuOpen, selectedImage, activeCategory]);

            return (
                <div className="min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'bg-white/80 backdrop-blur-xl py-4 border-b border-zinc-100' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer group">
                                <i data-lucide="camera" className="w-5 h-5 group-hover:rotate-12 transition-transform duration-300"></i>
                                <span className="text-xl font-light tracking-tighter uppercase whitespace-nowrap">Studio.Wu</span>
                            </div>
                            <div className="hidden md:flex items-center gap-12 text-[11px] uppercase tracking-[0.25em] font-medium">
                                <a href="#works" className="hover:text-zinc-400 transition-colors">作品</a>
                                <a href="#about" className="hover:text-zinc-400 transition-colors">关于</a>
                                <a href="#contact" className="hover:text-zinc-400 transition-colors">联系</a>
                            </div>
                            <button className="md:hidden p-2" onClick={() => setIsMenuOpen(true)}>
                                <i data-lucide="menu" className="w-6 h-6"></i>
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center gap-12 text-3xl uppercase tracking-[0.2em] font-light"
                            >
                                <button className="absolute top-8 right-6 p-2" onClick={() => setIsMenuOpen(false)}>
                                    <i data-lucide="x" className="w-8 h-8"></i>
                                </button>
                                <a href="#works" onClick={() => setIsMenuOpen(false)}>作品集</a>
                                <a href="#about" onClick={() => setIsMenuOpen(false)}>关于我</a>
                                <a href="#contact" onClick={() => setIsMenuOpen(false)}>联系方式</a>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Hero */}
                    <header className="pt-48 pb-24 px-6 max-w-7xl mx-auto">
                        <motion.h1 
                            initial={{ y: 40, opacity: 0 }} animate={{ y: 0, opacity: 1 }}
                            className="text-6xl md:text-9xl font-light tracking-tight leading-[0.9] mb-12"
                        >
                            通过镜头<br />
                            <span className="italic font-serif">捕捉</span> 那些被忽视的瞬间
                        </motion.h1>
                        
                        <div className="flex flex-wrap gap-8 md:gap-14 text-[10px] uppercase tracking-[0.3em] font-medium">
                            {CATEGORIES.map(cat => (
                                <button 
                                    key={cat} onClick={() => setActiveCategory(cat)}
                                    className={`pb-3 relative transition-colors ${activeCategory === cat ? 'text-zinc-950' : 'text-zinc-400 hover:text-zinc-600'}`}
                                >
                                    {cat}
                                    {activeCategory === cat && <motion.div layoutId="activeCat" className="absolute bottom-0 left-0 w-full h-[1.5px] bg-zinc-950" />}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* Gallery */}
                    <main id="works" className="max-w-7xl mx-auto px-6 py-24">
                        <div className="masonry-grid space-y-10">
                            {filteredPhotos.map((photo) => (
                                <motion.div 
                                    layout key={photo.id}
                                    className="break-inside relative group cursor-zoom-in overflow-hidden bg-zinc-100 rounded-sm shadow-sm hover:shadow-2xl transition-all duration-700"
                                    onClick={() => setSelectedImage(photo)}
                                >
                                    <img src={photo.url} alt={photo.title} className="w-full h-auto grayscale group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-105" />
                                    <div className="absolute inset-0 bg-zinc-950/20 opacity-0 group-hover:opacity-100 transition-opacity duration-700 flex flex-col justify-end p-8">
                                        <p className="text-white text-[9px] uppercase tracking-[0.4em] mb-2">{photo.category}</p>
                                        <h3 className="text-white text-2xl font-light tracking-tight">{photo.title}</h3>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </main>

                    {/* About */}
                    <section id="about" className="bg-zinc-50/50 py-48 px-6">
                        <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-24 items-center">
                            <div className="aspect-[4/5] overflow-hidden grayscale hover:grayscale-0 transition-all duration-1000 shadow-2xl rounded-sm">
                                <img src="./wu-zexiao.jpg" alt="Wu Zexiao" className="w-full h-full object-cover object-top scale-110 hover:scale-100 transition-transform duration-[2s]" />
                            </div>
                            <div className="space-y-12">
                                <h2 className="text-4xl md:text-5xl font-light tracking-tight leading-tight">我是吴泽枭，一名专注于光影与构图的 <span className="italic font-serif">独立摄影师</span>。</h2>
                                <p className="text-zinc-500 leading-relaxed text-xl font-light">
                                    在快节奏的世界里，我倾向于慢下来。摄影不仅是记录，更是一种感官的延伸。我寻找城市中的几何秩序，也追逐自然界那转瞬即逝的光线。
                                </p>
                                <div className="flex gap-12 text-[11px] uppercase tracking-[0.4em] font-semibold">
                                    <a href="#" className="border-b border-transparent hover:border-zinc-950 pb-2 transition-all">Instagram</a>
                                    <a href="#" className="border-b border-transparent hover:border-zinc-950 pb-2 transition-all">Behance</a>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer id="contact" className="py-24 px-6 border-t border-zinc-100 text-zinc-400">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
                            <div className="flex items-center gap-3">
                                <i data-lucide="camera" className="w-4 h-4"></i>
                                <p className="text-[10px] uppercase tracking-[0.4em]">© 2024 Studio Wu. Independent Photography.</p>
                            </div>
                            <div className="flex gap-14 list-none">
                                <li><i data-lucide="instagram" className="w-5 h-5 cursor-pointer hover:text-zinc-900 transition-all"></i></li>
                                <li><i data-lucide="mail" className="w-5 h-5 cursor-pointer hover:text-zinc-900 transition-all"></i></li>
                            </div>
                        </div>
                    </footer>

                    {/* Lightbox */}
                    <AnimatePresence>
                        {selectedImage && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[100] bg-white/95 backdrop-blur-2xl flex items-center justify-center p-6"
                                onClick={() => setSelectedImage(null)}
                            >
                                <button className="absolute top-8 right-8 text-zinc-950 p-2"><i data-lucide="x" className="w-8 h-8"></i></button>
                                <div className="max-w-6xl w-full h-full flex flex-col items-center justify-center">
                                    <motion.img 
                                        initial={{ scale: 0.9 }} animate={{ scale: 1 }} src={selectedImage.url} 
                                        className="max-w-full max-h-[75vh] object-contain shadow-2xl" 
                                    />
                                    <div className="mt-12 text-center">
                                        <p className="text-[10px] uppercase tracking-[0.5em] text-zinc-400 mb-2">{selectedImage.category}</p>
                                        <h2 className="text-3xl font-light tracking-tight">{selectedImage.title}</h2>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
